# example playbook for module 'irmc_ntp'
# to manage iRMC time options

# variables not defined in this playbook are expected to be provided
# elsewhere, e.g. in group_vars/all

- name: irmc_ntp - usage examples
  connection: local
  hosts: iRMC_group

  vars:
    # iRMC login credentials
    # irmc_user: "admin"
    # irmc_password: "admin"
    # Note: set validate_certificate to false for self-signed certificate
    # validate_certificate: false

  gather_facts: false

  tasks:
    # Get iRMC time settings
    - block:
      - name: Get iRMC time settings
        fsas_temp_ns.primergy.irmc_ntp:
          irmc_url: "{{ inventory_hostname }}"
          irmc_username: "{{ irmc_user }}"
          irmc_password: "{{ irmc_password }}"
          validate_certs: "{{ validate_certificate }}"
          command: "get"
        register: time
        delegate_to: localhost
      - name: Show iRMC time settings
        debug:
          var: time.time_settings
      tags:
        - get

    # Set iRMC time option(s)
    - name: Set iRMC time option(s)
      fsas_temp_ns.primergy.irmc_ntp:
        irmc_url: "{{ inventory_hostname }}"
        irmc_username: "{{ irmc_user }}"
        irmc_password: "{{ irmc_password }}"
        validate_certs: "{{ validate_certificate }}"
        command: "set"
        time_mode: "{{ time_mode | default(omit) }}"
        rtc_mode: "{{ rtc_mode | default(omit) }}"
        time_zone_location: "{{ time_zone_location | default(omit) }}"
        ntp_server_primary: "{{ ntp_server_primary | default(omit) }}"
        ntp_server_secondary: "{{ ntp_server_secondary | default(omit) }}"
      delegate_to: localhost
      tags:
        - set
